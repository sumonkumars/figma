<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>figma design</title>
    <!-- google fonts start -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- google fonts end -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section id="haederPart">
        <div class="container">
            <div class="haederFlex">
            <div class="logo">
                <img src="images/Logo (1).png" alt="Logo (1).png">
            </div>
            <div class="menu">
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Serice</li>
                    <li>Blog</li>
                    <li>Contact</li>
                </ul>
            </div>
            <div class="haederButton">
                <button> Contact us</button>
            </div>
        </div>
        </div>
    </section>
    <!-- banner start -->
     <section id="bannerPart">
        <div class="container">
            <div class="bannerFlex">
                <div class="bannerLeft">
                <h1>We Are Digital Product Design Agency</h1>
                <p>There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour, or randomised words which don't look even slightly believable.</p>
                <div class="bannerButton">
                    <button>Get started</button>
                </div>
            </div>
            <div class="bannerRight">
                <img src="images/Banner.png" alt="Banner.png">
            </div>
            </div>
        </div>
     </section>
    <!-- banner end -->
</body>
</html>
